name: Update economic indicators

# Runs every day at 05:30 UTC, and can be run manually from the Actions tab.
on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: write   # allows the job to commit the refreshed CSVs back to the repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch indicators
        run: python fetch_indicators.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/leading_annual.csv data/leading_periodic.csv data/fetch_log.txt
          git diff --staged --quiet || git commit -m "Auto-update indicators ($(date -u +%Y-%m-%d))"
          git push
